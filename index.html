<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rainbows OS V2.1</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <div class="eyebrow">Rainbows OS</div>
      <h1 id="screen-title">Hoy</h1>
      <p id="today-label" class="muted"></p>
    </div>
    <div class="version">V2.1</div>
  </header>

  <main id="app"></main>

  <nav class="bottom-nav" aria-label="Navegación principal">
    <button data-view="today" class="active">Hoy</button>
    <button data-view="calendar">Calendario</button>
    <button data-view="rooms">Salas</button>
    <button data-view="settings">Config</button>
  </nav>

  <dialog id="worker-dialog" class="dialog">
    <form method="dialog">
      <h3>¿Quién realizó esta tarea?</h3>
      <div id="worker-options" class="worker-options"></div>
      <input id="worker-other" class="text-input" placeholder="Otro nombre" />
      <menu>
        <button value="cancel" class="secondary">Cancelar</button>
        <button id="confirm-worker" value="default" class="primary">Guardar</button>
      </menu>
    </form>
  </dialog>

  <script src="app.js?v=2.1"></script>
</body>
</html>
