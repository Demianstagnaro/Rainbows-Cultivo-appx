<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Rainbows OS</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Rainbows OS</h1>
      <p id="todayText" class="muted"></p>
    </div>
    <button id="installBtn" class="small hidden">Instalar</button>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="today">Hoy</button>
    <button class="tab" data-view="calendar">Calendario</button>
    <button class="tab" data-view="rooms">Salas</button>
    <button class="tab" data-view="settings">Config</button>
  </nav>

  <main>
    <section id="todayView" class="view active"></section>
    <section id="calendarView" class="view"></section>
    <section id="roomsView" class="view"></section>
    <section id="settingsView" class="view"></section>
  </main>

  <dialog id="doneDialog">
    <form method="dialog" class="dialog-card">
      <h3>¿Quién realizó esta tarea?</h3>
      <p id="dialogTask" class="muted"></p>
      <select id="workerSelect"></select>
      <textarea id="obsInput" placeholder="Observación opcional"></textarea>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">Cancelar</button>
        <button id="confirmDoneBtn" value="default" class="primary">Guardar</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
